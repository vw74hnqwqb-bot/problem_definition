<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전략적 교육 컨설턴트 | 생기부 융합 탐구 제안기</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo">Strategic<span>Consultant</span></div>
    </nav>

    <main>
        <section class="hero">
            <h1>당신의 평범한 활동을<br><span class="highlight">입시의 무기</span>로 만듭니다</h1>
            <p>수행평가와 진로를 연결하여 매력적인 융합 탐구 주제를 제안받으세요.</p>
        </section>

        <section class="input-section">
            <div class="card glass">
                <div class="input-group">
                    <label for="subject-name">
                        <span class="icon">📖</span> 교과목명
                    </label>
                    <input type="text" id="subject-name" placeholder="예: 국어, 수학1, 물리학1">
                </div>

                <div class="input-group">
                    <label for="performance-content">
                        <span class="icon">📝</span> 수행평가/활동 내용
                    </label>
                    <textarea id="performance-content" placeholder="예: '난장이가 쏘아올린 작은 공' 속 도시 빈민의 삶 분석"></textarea>
                </div>

                <div class="input-group">
                    <label for="career-interest">
                        <span class="icon">🚀</span> 희망 진로 / 관심 분야
                    </label>
                    <input type="text" id="career-interest" placeholder="예: 데이터 구조화, 시스템 최적화 (학과명 자제)"></input>
                </div>

                <button id="generate-btn" class="primary-btn">
                    <span>전략적 가이드라인 생성하기</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
        </section>

        <section id="result-section" class="result-section hidden">
            <div class="loader">
                <div class="spinner"></div>
                <p>전략 분석 중...</p>
            </div>

            <div id="report-card" class="card glass result-card hidden">
                <div class="report-header">
                    <h2>✨ 맞춤형 전략 보고서</h2>
                    <button id="copy-btn" class="secondary-btn">결과 복사하기</button>
                </div>
                
                <div class="report-content">
                    <div id="step-1-container" class="report-item hidden">
                        <h2 style="color: var(--accent); margin-bottom: 1.5rem;">[Step 1. 기초 조사 및 소재 추천]</h2>
                        <div id="result-step-1" class="summary-box"></div>
                    </div>

                    <div class="report-item">
                        <h2 style="color: var(--accent); margin-bottom: 1.5rem;">[Step 2. 최종 1개 선택 및 문제 정의]</h2>
                        <div id="result-step-2" class="logic-box"></div>
                    </div>

                    <div class="report-item">
                        <h2 style="color: var(--accent); margin-bottom: 1.5rem;">[Step 3. 나만의 융합 관점 (진로 연계)]</h2>
                        <div id="result-step-3" class="logic-box" style="border-left: 4px solid var(--secondary);"></div>
                    </div>

                    <div class="report-item">
                        <h2 style="color: var(--accent); margin-bottom: 1.5rem;">[Step 4. 최종 결과물 뼈대 (Action Plan)]</h2>
                        <div id="result-step-4"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Strategic Education Consultant. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
